// rsh rendezvous + relay protocol.
// Wire-compatible with RustDesk hbbs/hbbr (field numbers match).
// Protocols are not copyrightable (Oracle v. Google, 2021).
//
// Copyright (c) 2026 Marco Del Pin — MIT License.

syntax = "proto3";
package rdv;

// --- Enums ---

enum NatType {
  UNKNOWN_NAT = 0;
  ASYMMETRIC = 1;
  SYMMETRIC = 2;
}

enum ConnType {
  DEFAULT_CONN = 0;
  FILE_TRANSFER = 1;
  PORT_FORWARD = 2;
  RDP = 3;
  VIEW_CAMERA = 4;
  TERMINAL = 5;
}

// --- Registration ---

message RegisterPeer {
  string id = 1;
  int32 serial = 2;
  // rsh extensions (field 3+, ignored by RustDesk clients)
  string group_hash = 3;   // SHA256(enrollment_token), hex-encoded
  string hostname = 4;
  string platform = 5;     // "windows" or "linux"
  int32 service_port = 6;  // rsh command listener port (e.g. 8822)
}

message RegisterPeerResponse {
  bool request_pk = 2;
}

message RegisterPk {
  string id = 1;
  bytes uuid = 2;
  bytes pk = 3;
  string old_id = 4;
  bool no_register_device = 5;
}

message RegisterPkResponse {
  enum Result {
    OK = 0;
    UUID_MISMATCH = 2;
    ID_EXISTS = 3;
    TOO_FREQUENT = 4;
    INVALID_ID_FORMAT = 5;
    NOT_SUPPORT = 6;
    SERVER_ERROR = 7;
  }
  Result result = 1;
  int32 keep_alive = 2;
}

// --- Punch Hole (NAT traversal) ---

message PunchHoleRequest {
  string id = 1;
  NatType nat_type = 2;
  string licence_key = 3;
  ConnType conn_type = 4;
  string token = 5;
  string version = 6;
  int32 udp_port = 7;
  bool force_relay = 8;
  int32 upnp_port = 9;
  bytes socket_addr_v6 = 10;
}

message PunchHole {
  bytes socket_addr = 1;
  string relay_server = 2;
  NatType nat_type = 3;
  int32 udp_port = 4;
  bool force_relay = 5;
  int32 upnp_port = 6;
  bytes socket_addr_v6 = 7;
}

message PunchHoleSent {
  bytes socket_addr = 1;
  string id = 2;
  string relay_server = 3;
  NatType nat_type = 4;
  string version = 5;
  int32 upnp_port = 6;
  bytes socket_addr_v6 = 7;
}

message PunchHoleResponse {
  bytes socket_addr = 1;
  bytes pk = 2;
  enum Failure {
    ID_NOT_EXIST = 0;
    PEER_ON_LAN = 1;
    OFFLINE = 2;
    LICENSE_MISMATCH = 3;
    LICENSE_OVERUSE = 4;
  }
  Failure failure = 3;
  string relay_server = 4;
  oneof union {
    NatType nat_type = 5;
    bool is_local = 6;
  }
  string other_failure = 7;
}

// --- Relay ---

message RequestRelay {
  string id = 1;
  string uuid = 2;
  bytes socket_addr = 3;
  string relay_server = 4;
  bool secure = 5;
  string licence_key = 6;
  ConnType conn_type = 7;
  string token = 8;
}

message RelayResponse {
  bytes socket_addr = 1;
  string uuid = 2;
  string relay_server = 3;
  oneof union {
    string id = 4;
    bytes pk = 5;
  }
  string refuse_reason = 6;
  string version = 7;
}

// --- Same-LAN detection ---

message FetchLocalAddr {
  bytes socket_addr = 1;
  string relay_server = 2;
  bytes socket_addr_v6 = 3;
}

message LocalAddr {
  bytes socket_addr = 1;
  bytes local_addr = 2;
  string relay_server = 3;
  string id = 4;
  string version = 5;
  bytes socket_addr_v6 = 6;
}

// --- Config + Discovery ---

message ConfigUpdate {
  int32 serial = 1;
  repeated string rendezvous_servers = 2;
}

message SoftwareUpdate {
  string url = 1;
}

message TestNatRequest {
  int32 serial = 1;
}

message TestNatResponse {
  int32 port = 1;
  ConfigUpdate cu = 2;
}

message PeerDiscovery {
  string cmd = 1;
  string mac = 2;
  string id = 3;
  string username = 4;
  string hostname = 5;
  string platform = 6;
  string misc = 7;
}

message OnlineRequest {
  string id = 1;
  repeated string peers = 2;
}

message OnlineResponse {
  bytes states = 1;
}

// --- Health + Metrics (rsh extensions) ---

message HealthCheck {
  string token = 1;
}

message HealthResponse {
  uint64 timestamp = 1;
  uint32 peers_online = 2;
  uint32 relays_active = 3;
  string version = 4;
}

message MetricsRequest {
  string auth_token = 1;
}

message MetricsResponse {
  bytes json_payload = 1;
}

// --- Fleet enrollment / group discovery (rsh extensions) ---

message GroupQuery {
  string group_hash = 1;   // SHA256(enrollment_token), hex
  bytes hmac_proof = 2;    // HMAC-SHA256(nonce_bytes, enrollment_token)
  uint64 nonce = 3;        // timestamp-based nonce (unix secs)
}

message GroupQueryResponse {
  repeated GroupPeer peers = 1;
}

message GroupPeer {
  string device_id = 1;
  string hostname = 2;
  string platform = 3;
  bytes socket_addr = 4;   // AddrMangle-encoded
  uint64 last_seen_secs = 5;  // seconds since UNIX epoch
  int32 service_port = 6;  // rsh command listener port (0 = default 8822)
}

// --- Fleet peer list (rsh extension) ---

message ListPeers {
  string licence_key = 1;  // must match server's --key
}

message ListPeersResponse {
  repeated GroupPeer peers = 1;  // reuse GroupPeer format
}

// --- Top-level envelope ---
// Field numbers match RustDesk RendezvousMessage for backwards compatibility.

message RendezvousMessage {
  oneof union {
    RegisterPeer register_peer = 6;
    RegisterPeerResponse register_peer_response = 7;
    PunchHoleRequest punch_hole_request = 8;
    PunchHole punch_hole = 9;
    PunchHoleSent punch_hole_sent = 10;
    PunchHoleResponse punch_hole_response = 11;
    FetchLocalAddr fetch_local_addr = 12;
    LocalAddr local_addr = 13;
    ConfigUpdate configure_update = 14;
    RegisterPk register_pk = 15;
    RegisterPkResponse register_pk_response = 16;
    SoftwareUpdate software_update = 17;
    RequestRelay request_relay = 18;
    RelayResponse relay_response = 19;
    TestNatRequest test_nat_request = 20;
    TestNatResponse test_nat_response = 21;
    PeerDiscovery peer_discovery = 22;
    OnlineRequest online_request = 23;
    OnlineResponse online_response = 24;
    // field 25 reserved (KeyExchange in RustDesk, not used by rsh)
    HealthCheck health_check = 26;
    // rsh extensions (field numbers > 30, ignored by RustDesk clients)
    HealthResponse health_response = 31;
    MetricsRequest metrics_request = 32;
    MetricsResponse metrics_response = 33;
    GroupQuery group_query = 34;
    GroupQueryResponse group_query_response = 35;
    ListPeers list_peers = 36;
    ListPeersResponse list_peers_response = 37;
  }
}
